name: Publish Service Image

on:
  push:
    tags:
      - "services-v*"
  workflow_dispatch:

jobs:
  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "VERSION=${REF_NAME#services-v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches pyproject.toml
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#services-v}"
          FILE_VERSION=$(grep -m1 '^version' services/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($FILE_VERSION)"
            exit 1
          fi

      - uses: docker/build-push-action@v6
        with:
          context: services/
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docu-store:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/docu-store:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
