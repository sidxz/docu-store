name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Verify version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#cli-v}"
          PKG_VERSION=$(node --input-type=module -e "import { readFileSync } from 'fs'; const p = JSON.parse(readFileSync('./cli/package.json', 'utf8')); process.stdout.write(p.version);")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish @docu-store/cli
        working-directory: cli
        run: npm publish --provenance --access public
