name: Publish Web Image

on:
  push:
    tags:
      - "web-v*"
  workflow_dispatch:

jobs:
  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "VERSION=${REF_NAME#web-v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches package.json
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#web-v}"
          PKG_VERSION=$(node --input-type=module -e "import { readFileSync } from 'fs'; const p = JSON.parse(readFileSync('./web/apps/portal/package.json', 'utf8')); process.stdout.write(p.version);")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      # No build-args needed — config is loaded at runtime via /api/config
      - uses: docker/build-push-action@v6
        with:
          context: web/
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docu-store-web:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/docu-store-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
